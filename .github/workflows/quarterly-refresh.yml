name: Quarterly Content Refresh

on:
  workflow_dispatch:
    inputs:
      force_slug:
        description: "Force refresh a specific article slug (leave empty for auto-scan)"
        required: false
        type: string
        default: ""
  schedule:
    # First day of Jan, Apr, Jul, Oct at 10am UTC
    - cron: "0 10 1 1,4,7,10 *"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  find-refresh-candidates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for active Copilot work
        id: copilot-check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });
            const activeCopilotPRs = openPRs.filter(pr =>
              pr.head.ref.startsWith('copilot/')
            );

            if (activeCopilotPRs.length > 0) {
              console.log('Copilot is busy. Skipping refresh.');
              core.setOutput('skip', 'true');
              return;
            }

            core.setOutput('skip', 'false');

      - name: Scan for refresh candidates
        if: steps.copilot-check.outputs.skip != 'true'
        id: scan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const forceSlug = '${{ inputs.force_slug }}'.trim();
            const now = new Date();
            const threeMonthsAgo = new Date(now);
            threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);

            const candidates = [];

            // Scan research articles (primary refresh targets)
            const researchDir = 'src/content/research';
            if (fs.existsSync(researchDir)) {
              for (const file of fs.readdirSync(researchDir)) {
                if (!file.endsWith('.mdx') && !file.endsWith('.md')) continue;
                const slug = file.replace(/\.mdx?$/, '');

                if (forceSlug && slug !== forceSlug) continue;

                const content = fs.readFileSync(path.join(researchDir, file), 'utf8');
                const frontmatterMatch = content.match(/^---\n([\s\S]*?)\n---/);
                if (!frontmatterMatch) continue;

                const fm = frontmatterMatch[1];

                // Extract pubDate
                const pubDateMatch = fm.match(/pubDate:\s*(\d{4}-\d{2}-\d{2})/);
                // Extract lastUpdated
                const lastUpdatedMatch = fm.match(/lastUpdated:\s*(\d{4}-\d{2}-\d{2})/);

                const pubDate = pubDateMatch ? new Date(pubDateMatch[1]) : null;
                const lastUpdated = lastUpdatedMatch ? new Date(lastUpdatedMatch[1]) : null;
                const effectiveDate = lastUpdated || pubDate;

                if (!effectiveDate) continue;

                // Check if article is older than 3 months since last update
                const isStale = effectiveDate < threeMonthsAgo;

                // Check for refresh commitment language
                const hasRefreshPromise = /quarterly|check back|will.*update|next.*update/i.test(content);

                const title = fm.match(/title:\s*"?([^"\n]+)"?/)?.[1] || slug;

                if (forceSlug || isStale || hasRefreshPromise) {
                  candidates.push({
                    slug,
                    title,
                    type: 'research',
                    pubDate: pubDate?.toISOString().split('T')[0] || 'unknown',
                    lastUpdated: lastUpdated?.toISOString().split('T')[0] || 'never',
                    isStale,
                    hasRefreshPromise,
                    forced: !!forceSlug
                  });
                }
              }
            }

            // Scan tool reviews for stale pricing/deals (secondary)
            const toolsDir = 'src/content/tools';
            if (fs.existsSync(toolsDir) && !forceSlug) {
              for (const file of fs.readdirSync(toolsDir)) {
                if (!file.endsWith('.mdx') && !file.endsWith('.md')) continue;
                const slug = file.replace(/\.mdx?$/, '');
                const content = fs.readFileSync(path.join(toolsDir, file), 'utf8');
                const frontmatterMatch = content.match(/^---\n([\s\S]*?)\n---/);
                if (!frontmatterMatch) continue;

                const fm = frontmatterMatch[1];
                const lastUpdatedMatch = fm.match(/lastUpdated:\s*(\d{4}-\d{2}-\d{2})/);
                const lastUpdated = lastUpdatedMatch ? new Date(lastUpdatedMatch[1]) : null;

                // Tool reviews older than 6 months without an update get flagged
                const sixMonthsAgo = new Date(now);
                sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);

                const pubDateMatch = fm.match(/pubDate:\s*(\d{4}-\d{2}-\d{2})/);
                const pubDate = pubDateMatch ? new Date(pubDateMatch[1]) : null;
                const effectiveDate = lastUpdated || pubDate;

                if (effectiveDate && effectiveDate < sixMonthsAgo) {
                  const title = fm.match(/name:\s*"?([^"\n]+)"?/)?.[1] || slug;
                  candidates.push({
                    slug,
                    title,
                    type: 'tool',
                    pubDate: pubDate?.toISOString().split('T')[0] || 'unknown',
                    lastUpdated: lastUpdated?.toISOString().split('T')[0] || 'never',
                    isStale: true,
                    hasRefreshPromise: false,
                    forced: false
                  });
                }
              }
            }

            if (candidates.length === 0) {
              console.log('No articles need refreshing this quarter.');
              core.setOutput('has_candidates', 'false');
              return;
            }

            console.log(`Found ${candidates.length} refresh candidate(s):`);
            for (const c of candidates) {
              console.log(`  - [${c.type}] ${c.title} (last updated: ${c.lastUpdated}, stale: ${c.isStale}, promise: ${c.hasRefreshPromise})`);
            }

            core.setOutput('has_candidates', 'true');
            core.setOutput('candidates', JSON.stringify(candidates));

      - name: Create refresh issue for Copilot
        if: steps.copilot-check.outputs.skip != 'true' && steps.scan.outputs.has_candidates == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src/data/site-config.json', 'utf8'));
            const candidates = JSON.parse('${{ steps.scan.outputs.candidates }}'.replace(/'/g, "\\'"));

            const now = new Date();
            const quarter = `Q${Math.ceil((now.getMonth() + 1) / 3)}`;
            const year = now.getFullYear();

            let issueBody = `## Quarterly Content Refresh: ${quarter} ${year}\n\n`;
            issueBody += `The following articles are due for a refresh. Update them in priority order (research with refresh promises first, then stale tools).\n\n`;
            issueBody += `**Before starting, read:**\n`;
            issueBody += `- \`AGENTS.md\` (brand guidelines)\n`;
            issueBody += `- \`src/data/site-config.json\` (niche config)\n`;
            issueBody += `- \`.github/agents/publisher.agent.md\` (full workflow)\n\n`;

            issueBody += `### Articles to Refresh\n\n`;

            for (const c of candidates) {
              const filePath = c.type === 'tool'
                ? `src/content/tools/${c.slug}.mdx`
                : `src/content/research/${c.slug}.mdx`;
              issueBody += `#### ${c.title}\n`;
              issueBody += `- **File:** \`${filePath}\`\n`;
              issueBody += `- **Type:** ${c.type}\n`;
              issueBody += `- **Published:** ${c.pubDate}\n`;
              issueBody += `- **Last updated:** ${c.lastUpdated}\n`;
              issueBody += `- **Has refresh promise in text:** ${c.hasRefreshPromise ? 'Yes' : 'No'}\n`;
              if (c.forced) issueBody += `- **Manually requested**\n`;
              issueBody += `\n`;
            }

            issueBody += `### Refresh Instructions\n\n`;
            issueBody += `For each article above:\n\n`;
            issueBody += `1. **Re-verify all product links and data.** Fetch every AppSumo/vendor URL in the article. If a product is dead or sold out, remove or update the reference.\n`;
            issueBody += `2. **Update statistics and benchmarks.** Re-run any tests mentioned. Update numbers, scores, and comparisons with current data. If you cannot re-verify a stat, add "as of [original date]" qualifier or reframe as editorial opinion.\n`;
            issueBody += `3. **Add new developments.** Has the product added features? Changed pricing? Launched a competitor? Add a new section or update existing sections.\n`;
            issueBody += `4. **Update the \`lastUpdated\` frontmatter field** to today's date (YYYY-MM-DD format).\n`;
            issueBody += `5. **Update any "check back" or "next update" language** in the article body to reference the NEXT quarter (${quarter === 'Q4' ? 'Q1 ' + (year + 1) : 'Q' + (Math.ceil((now.getMonth() + 1) / 3) + 1) + ' ' + year}).\n`;
            issueBody += `6. **Run the full Copy Review (Phase 5)** from publisher.agent.md. Refreshed content must pass the same AI detection and voice checks as new content.\n`;
            issueBody += `7. **Do NOT change the slug or URL.** The whole point is preserving the existing URL's authority.\n`;
            issueBody += `8. **Do NOT change \`pubDate\`.** Only update \`lastUpdated\`.\n\n`;

            issueBody += `### Voice & Quality\n\n`;
            issueBody += `- Author: ${cfg.author.name} (first person: "I retested," "I found that")\n`;
            issueBody += `- Audience: ${cfg.niche.audience}\n`;
            issueBody += `- No em-dashes. No banned phrases. No fabricated data.\n`;
            issueBody += `- Minimum word counts still apply: tool ${cfg.content.minWords.tool}, research ${cfg.content.minWords.research}\n\n`;

            issueBody += `### After Refreshing\n\n`;
            issueBody += `1. Increment \`CACHE_NAME\` in \`public/sw.js\`\n`;
            issueBody += `2. Run \`npm run build\` to confirm zero errors\n`;
            issueBody += `3. Do NOT update content-calendar.json (this is a refresh, not a new publish)\n`;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[refresh] ${quarter} ${year} quarterly content update`,
              body: issueBody,
              labels: ['copilot', 'content-refresh']
            });

            console.log(`Created refresh issue #${issue.number}: ${issue.title}`);

      - name: Assign to Copilot
        if: steps.copilot-check.outputs.skip != 'true' && steps.scan.outputs.has_candidates == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'copilot,content-refresh',
              sort: 'created',
              direction: 'desc',
              per_page: 1
            });

            if (issues.length > 0) {
              try {
                await github.rest.issues.addAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issues[0].number,
                  assignees: ['copilot']
                });
                console.log(`Assigned issue #${issues[0].number} to Copilot`);
              } catch (e) {
                console.log(`Could not assign to Copilot: ${e.message}`);
                console.log('Assign copilot manually or ensure Copilot coding agent is enabled.');
              }
            }
