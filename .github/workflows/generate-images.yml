name: Generate Hero Images

on:
  pull_request:
    types: [review_requested, ready_for_review]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  process-copilot-pr:
    if: startsWith(github.head_ref, 'copilot/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Detect new content files needing images
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const typeMap = { tools: 'tool', playbooks: 'playbook', research: 'research' };

            const items = files
              .filter(f =>
                f.status === 'added' &&
                /^src\/content\/(tools|playbooks|research)\/.+\.mdx$/.test(f.filename)
              )
              .map(f => {
                const parts = f.filename.split('/');
                const folder = parts[2];
                const slug = parts[3].replace('.mdx', '');
                return { type: typeMap[folder], slug, imagePath: `public/images/${slug}.png` };
              })
              .filter(({ imagePath }) => {
                if (!fs.existsSync(imagePath)) return true;
                // Copilot may create small placeholder images; real hero images are 300KB+
                const stats = fs.statSync(imagePath);
                return stats.size < 50000;
              });

            console.log('Content files needing images:', JSON.stringify(items));
            core.setOutput('items', JSON.stringify(items));
            core.setOutput('has_items', items.length > 0 ? 'true' : 'false');

      - name: Check GEMINI_API_KEY availability
        id: key_check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ GEMINI_API_KEY is not configured – skipping image generation."
          fi

      - name: Generate hero images
        if: steps.detect.outputs.has_items == 'true' && steps.key_check.outputs.available == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ITEMS: ${{ steps.detect.outputs.items }}
        run: |
          node -e "
            const { spawnSync } = require('child_process');
            const items = JSON.parse(process.env.ITEMS);
            for (const { type, slug } of items) {
              console.log('Generating image for:', type, slug);
              const result = spawnSync('node', ['scripts/generate-images.mjs', '--' + type, slug], { stdio: 'inherit' });
              if (result.status !== 0) process.exit(result.status || 1);
            }
          "

      - name: Commit and push generated images
        if: steps.detect.outputs.has_items == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/ src/content/
          if git diff --staged --quiet; then
            echo "No new images to commit."
          else
            git commit -m "ci: generate hero images for new content"
            git push
          fi

      - name: Mark PR as ready for review
        if: github.event.pull_request.draft == true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr ready "$PR_NUMBER"

      - name: Build site (validation gate)
        run: npm run build

      - name: Approve PR
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr review "$PR_NUMBER" --approve --body "Auto-approved build passed."

      - name: Merge PR
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh pr merge "$PR_NUMBER" --squash --delete-branch
