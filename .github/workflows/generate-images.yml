name: Generate Hero Images

on:
  pull_request:
    types: [ready_for_review]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  process-copilot-pr:
    if: startsWith(github.head_ref, 'copilot/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Detect new content files needing images
        id: detect
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const typeMap = { tools: 'tool', playbooks: 'playbook', research: 'research' };

            const items = files
              .filter(f =>
                f.status === 'added' &&
                /^src\/content\/(tools|playbooks|research)\/.+\.mdx$/.test(f.filename)
              )
              .map(f => {
                const parts = f.filename.split('/');
                const folder = parts[2];
                const slug = parts[3].replace('.mdx', '');
                return { type: typeMap[folder], slug, imagePath: `public/images/${slug}.png` };
              })
              .filter(({ imagePath }) => {
                if (!fs.existsSync(imagePath)) return true;
                // Copilot may create small placeholder images; real hero images are 300KB+
                const stats = fs.statSync(imagePath);
                return stats.size < 50000;
              });

            console.log('Content files needing images:', JSON.stringify(items));
            core.setOutput('items', JSON.stringify(items));
            core.setOutput('has_items', items.length > 0 ? 'true' : 'false');

      - name: Verify deals are active (sold-out CI gate)
        id: deal_check
        if: steps.detect.outputs.has_items == 'true'
        env:
          ITEMS: ${{ steps.detect.outputs.items }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            const items = JSON.parse(process.env.ITEMS);
            const toolItems = items.filter(i => i.type === 'tool');

            if (toolItems.length === 0) {
              console.log('No tool reviews in this PR. Skipping deal check.');
              return;
            }

            for (const item of toolItems) {
              const mdxPath = `src/content/tools/${item.slug}.mdx`;
              if (!fs.existsSync(mdxPath)) continue;
              const content = fs.readFileSync(mdxPath, 'utf8');

              // Extract affiliate link from frontmatter
              const linkMatch = content.match(/affiliateLink:\s*"([^"]+)"/);
              if (!linkMatch) {
                console.log(`No affiliate link in ${mdxPath}. Skipping deal check.`);
                continue;
              }

              // Decode the AppSumo product URL from the affiliate deep link
              let productUrl;
              try {
                productUrl = decodeURIComponent(new URL(linkMatch[1]).searchParams.get('u'));
              } catch (e) {
                console.log(`Could not parse product URL: ${e.message}`);
                continue;
              }

              if (!productUrl || !productUrl.includes('appsumo.com')) {
                console.log(`Product URL is not AppSumo: ${productUrl}`);
                continue;
              }

              console.log(`Checking deal status: ${item.slug} → ${productUrl}`);

              let html;
              try {
                const res = await fetch(productUrl, {
                  headers: { 'User-Agent': 'Mozilla/5.0 (compatible; DealChecker/1.0)' }
                });
                html = await res.text();
              } catch (e) {
                console.log(`Could not fetch ${productUrl}: ${e.message}. Skipping.`);
                continue;
              }

              // Check for sold-out indicators
              const isSoldOut = /sold\s*out/i.test(html) || /notify\s*me\s*when\s*it\s*returns/i.test(html);

              if (isSoldOut) {
                const msg = `## Deal Check Failed\n\n` +
                  `**${item.slug}** is **sold out** on AppSumo.\n\n` +
                  `The Publisher agent selected a product that is not currently purchasable. ` +
                  `This PR cannot be published.\n\n` +
                  `Product page: ${productUrl}\n\n` +
                  `The next scheduled run will create a fresh issue for a different tool.`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: msg
                });

                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  state: 'closed'
                });

                // Close any open Publisher issues
                const { data: openIssues } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  labels: 'content,copilot',
                  per_page: 50
                });
                for (const issue of openIssues) {
                  if (issue.pull_request) continue;
                  if (issue.title.startsWith('[Publisher]')) {
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      state: 'closed',
                      state_reason: 'not_planned'
                    });
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issue.number,
                      body: `Closed: agent selected a sold-out product (${item.slug}). CI deal check failed.`
                    });
                    console.log('Closed Publisher issue #' + issue.number);
                  }
                }

                // Clean up the branch
                try {
                  await github.rest.git.deleteRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: 'heads/' + context.payload.pull_request.head.ref
                  });
                } catch (e) {
                  console.log('Branch cleanup: ' + e.message);
                }

                core.setFailed('Deal check failed: ' + item.slug + ' is sold out on AppSumo');
                return;
              }

              console.log('Deal active: ' + item.slug);
            }

      - name: Check GEMINI_API_KEY availability
        id: key_check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠️ GEMINI_API_KEY is not configured – skipping image generation."
          fi

      - name: Generate hero images
        if: steps.detect.outputs.has_items == 'true' && steps.key_check.outputs.available == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ITEMS: ${{ steps.detect.outputs.items }}
        run: |
          node -e "
            const { spawnSync } = require('child_process');
            const items = JSON.parse(process.env.ITEMS);
            for (const { type, slug } of items) {
              console.log('Generating image for:', type, slug);
              const result = spawnSync('node', ['scripts/generate-images.mjs', '--' + type, slug], { stdio: 'inherit' });
              if (result.status !== 0) process.exit(result.status || 1);
            }
          "

      - name: Commit and push generated images
        if: steps.detect.outputs.has_items == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/ src/content/
          if git diff --staged --quiet; then
            echo "No new images to commit."
          else
            git commit -m "ci: generate hero images for new content"
            git push
          fi

      - name: Mark PR as ready for review
        if: github.event.pull_request.draft == true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            // REST API cannot change draft status; GraphQL mutation is required
            await github.graphql(`
              mutation($id: ID!) {
                markPullRequestReadyForReview(input: {pullRequestId: $id}) {
                  pullRequest { isDraft }
                }
              }
            `, { id: context.payload.pull_request.node_id });
            console.log('Marked PR #' + context.payload.pull_request.number + ' as ready for review');

      - name: Detect content files for lint
        id: lint_files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const mdxFiles = files
              .filter(f => ['added', 'modified'].includes(f.status) &&
                /^src\/content\/(tools|playbooks|research)\/.+\.mdx$/.test(f.filename))
              .map(f => f.filename);
            console.log('Content files to lint:', mdxFiles);
            core.setOutput('files', mdxFiles.join(' '));
            core.setOutput('has_files', mdxFiles.length > 0 ? 'true' : 'false');

      - name: Content lint (automated quality gate)
        if: steps.lint_files.outputs.has_files == 'true'
        env:
          LINT_FILES: ${{ steps.lint_files.outputs.files }}
        run: |
          ARGS=""
          for f in $LINT_FILES; do
            ARGS="$ARGS --file $f"
          done
          node scripts/content-lint.mjs $ARGS

      - name: Build site (validation gate)
        run: npm run build

      - name: Clean build artifacts
        run: git checkout -- .

      - name: Determine PR type
        id: pr_type
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const isReviewer = title.startsWith('[Reviewer]');
            core.setOutput('is_reviewer', isReviewer ? 'true' : 'false');
            console.log(`PR #${context.payload.pull_request.number}: "${title}" → ${isReviewer ? 'Reviewer' : 'Publisher'}`);

      - name: Label PR for review (Publisher only)
        if: steps.pr_type.outputs.is_reviewer != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['review-ready']
            });
            console.log('Added review-ready label to PR #' + context.payload.pull_request.number);

      - name: Merge Reviewer PR and close Publisher PR
        if: steps.pr_type.outputs.is_reviewer == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;

            // Ensure PR is not a draft before merging
            if (context.payload.pull_request.draft) {
              try {
                await github.graphql(`
                  mutation($id: ID!) {
                    markPullRequestReadyForReview(input: {pullRequestId: $id}) {
                      pullRequest { isDraft }
                    }
                  }
                `, { id: context.payload.pull_request.node_id });
                console.log('Undrafted PR #' + prNumber);
              } catch (e) {
                console.log('Cannot undraft PR: ' + e.message + '. Will merge on ready_for_review event.');
                return;
              }
            }

            // Approve the Reviewer PR
            await github.rest.pulls.createReview({
              owner, repo,
              pull_number: prNumber,
              event: 'APPROVE',
              body: 'Reviewer PR: build passed, auto-merging.'
            });

            // Merge with squash
            await github.rest.pulls.merge({
              owner, repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });
            console.log('Merged Reviewer PR #' + prNumber);

            // Delete the Reviewer branch
            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: 'heads/' + context.payload.pull_request.head.ref
              });
            } catch (e) {
              console.log('Branch cleanup: ' + e.message);
            }

            // Close the original Publisher PR (same content file, different branch)
            const { data: prFiles } = await github.rest.pulls.listFiles({
              owner, repo,
              pull_number: prNumber,
              per_page: 100
            });
            const contentFiles = prFiles
              .filter(f => /^src\/content\/(tools|playbooks|research)\/.+\.mdx$/.test(f.filename))
              .map(f => f.filename);

            if (contentFiles.length > 0) {
              const { data: openPRs } = await github.rest.pulls.list({
                owner, repo, state: 'open', per_page: 100
              });

              for (const pr of openPRs) {
                if (pr.number === prNumber) continue;
                if (!pr.head.ref.startsWith('copilot/')) continue;

                try {
                  const { data: files } = await github.rest.pulls.listFiles({
                    owner, repo, pull_number: pr.number, per_page: 100
                  });
                  const overlaps = files.some(f => contentFiles.includes(f.filename));
                  if (overlaps) {
                    await github.rest.pulls.update({
                      owner, repo, pull_number: pr.number, state: 'closed'
                    });
                    console.log('Closed superseded Publisher PR #' + pr.number);

                    try {
                      await github.rest.git.deleteRef({
                        owner, repo, ref: 'heads/' + pr.head.ref
                      });
                    } catch (e) {
                      console.log('Branch cleanup for #' + pr.number + ': ' + e.message);
                    }
                  }
                } catch (e) {
                  console.log('Error checking PR #' + pr.number + ': ' + e.message);
                }
              }
            }

            // Close all open [Publisher] issues (they won't auto-close since the PR was closed, not merged)
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'content,copilot', per_page: 50
            });
            for (const issue of openIssues) {
              if (issue.pull_request) continue; // skip PRs
              if (issue.title.startsWith('[Publisher]')) {
                try {
                  await github.rest.issues.update({
                    owner, repo, issue_number: issue.number,
                    state: 'closed', state_reason: 'completed'
                  });
                  console.log('Closed Publisher issue #' + issue.number + ': ' + issue.title);
                } catch (e) {
                  console.log('Could not close issue #' + issue.number + ': ' + e.message);
                }
              }
            }
