name: Scheduled Content Publish

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: "Override content type"
        required: false
        type: choice
        options:
          - auto
          - tool
          - playbook
          - research
        default: auto
  schedule:
    - cron: "0 9 * * 1"
    - cron: "0 9 * * 4"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-content-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean up stale Copilot state
        id: cleanup
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 1. Check for active Copilot PRs (open PRs from copilot/* branches)
            const { data: openPRs } = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 100
            });
            const activeCopilotPRs = openPRs.filter(pr =>
              pr.head.ref.startsWith('copilot/') && !pr.draft
            );
            const draftCopilotPRs = openPRs.filter(pr =>
              pr.head.ref.startsWith('copilot/') && pr.draft
            );

            if (activeCopilotPRs.length > 0) {
              console.log(`Active Copilot PRs found: ${activeCopilotPRs.map(pr => `#${pr.number} (${pr.head.ref})`).join(', ')}`);
              console.log('Copilot is currently working. Skipping new issue creation.');
              core.setOutput('skip', 'true');
              return;
            }

            // 2. Close draft copilot PRs that are stale (no updates in 30+ minutes)
            for (const pr of draftCopilotPRs) {
              const updatedAt = new Date(pr.updated_at);
              const ageMinutes = (Date.now() - updatedAt.getTime()) / 60000;
              if (ageMinutes > 30) {
                try {
                  await github.rest.pulls.update({
                    owner, repo, pull_number: pr.number, state: 'closed'
                  });
                  console.log(`Closed stale draft PR #${pr.number}: ${pr.title} (${Math.round(ageMinutes)} min old)`);
                } catch (e) {
                  console.log(`Could not close PR #${pr.number}: ${e.message}`);
                }
              } else {
                // Any recent draft from a copilot/* branch means the agent is likely
                // mid-session. Creating another issue would either fail or cause
                // the agent to context-switch, so we wait for the next scheduled run.
                console.log(`Draft PR #${pr.number} is still recent (${Math.round(ageMinutes)} min). Copilot may still be working.`);
                core.setOutput('skip', 'true');
                return;
              }
            }

            // 3. Delete stale copilot/* branches (only those without open PRs)
            const { data: branches } = await github.rest.repos.listBranches({
              owner, repo, per_page: 100
            });
            const copilotBranches = branches.filter(b => b.name.startsWith('copilot/'));
            const openPRBranches = new Set(openPRs.map(pr => pr.head.ref));

            for (const branch of copilotBranches) {
              if (openPRBranches.has(branch.name)) {
                console.log(`Skipping ${branch.name}: has open PR`);
                continue;
              }
              try {
                await github.rest.git.deleteRef({
                  owner, repo, ref: `heads/${branch.name}`
                });
                console.log(`Deleted stale branch: ${branch.name}`);
              } catch (e) {
                console.log(`Could not delete ${branch.name}: ${e.message}`);
              }
            }

            if (copilotBranches.length === 0) {
              console.log('No stale copilot/* branches found');
            }

            // 4. Close stale content issues that Copilot failed to start
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'copilot', per_page: 50
            });

            for (const issue of openIssues) {
              if (issue.pull_request) continue;
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number: issue.number, per_page: 10
              });

              const hasCopilotError = comments.some(c =>
                c.body && c.body.includes('encountered an error and was unable to start')
              );

              if (hasCopilotError) {
                await github.rest.issues.update({
                  owner, repo, issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'not_planned'
                });
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: 'Closing automatically: Copilot agent failed to start on this issue. A fresh issue will be created by the next scheduled run.'
                });
                console.log(`Closed stale issue #${issue.number}: ${issue.title}`);
              }
            }

            // 5. Check for repository rulesets that might block Copilot
            try {
              const { data: rulesets } = await github.rest.repos.getRepoRulesets({
                owner, repo, per_page: 100
              });
              if (rulesets.length > 0) {
                console.log(`⚠️ Repository has ${rulesets.length} ruleset(s):`);
                for (const rs of rulesets) {
                  console.log(`  - "${rs.name}" (${rs.enforcement}, target: ${rs.target})`);
                }
                console.log('If Copilot fails to start, add it as a bypass actor in these rulesets.');
                console.log('Go to: Settings → Rules → Rulesets → [ruleset name] → Bypass list → Add "Copilot"');
              } else {
                console.log('No repository rulesets found');
              }
            } catch (e) {
              console.log(`Could not check rulesets: ${e.message}`);
            }

            core.setOutput('skip', 'false');

      - name: Determine content type from rotation
        if: steps.cleanup.outputs.skip != 'true'
        id: rotation
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const calendar = JSON.parse(fs.readFileSync('src/data/content-calendar.json', 'utf8'));

            const override = '${{ inputs.content_type }}'.trim();
            let contentType;

            if (override && override !== 'auto') {
              contentType = override;
              console.log(`Manual override: ${contentType}`);
            } else {
              const slot = calendar.nextSlot % calendar.rotation.length;
              contentType = calendar.rotation[slot];
              console.log(`Rotation slot ${slot}: ${contentType}`);
            }

            const toolFiles = fs.readdirSync('src/content/tools').filter(f => f.endsWith('.mdx'));
            const playbookFiles = fs.readdirSync('src/content/playbooks').filter(f => f.endsWith('.mdx'));
            const researchFiles = fs.readdirSync('src/content/research').filter(f => f.endsWith('.mdx'));

            const existingTools = toolFiles.map(f => f.replace('.mdx', '')).join(', ');
            const existingPlaybooks = playbookFiles.map(f => f.replace('.mdx', '')).join(', ');
            const existingResearch = researchFiles.map(f => f.replace('.mdx', '')).join(', ');

            const recentPublished = calendar.published
              .slice(-10)
              .map(p => `${p.type}: ${p.title} (${p.date})`)
              .join('\n- ');

            core.setOutput('content_type', contentType);
            core.setOutput('existing_tools', existingTools || 'none');
            core.setOutput('existing_playbooks', existingPlaybooks || 'none');
            core.setOutput('existing_research', existingResearch || 'none');
            core.setOutput('recent_published', recentPublished || 'none yet');

      - name: Create issue for Copilot
        if: steps.cleanup.outputs.skip != 'true'
        id: create-issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src/data/site-config.json', 'utf8'));

            const contentType = '${{ steps.rotation.outputs.content_type }}';
            const existingTools = '${{ steps.rotation.outputs.existing_tools }}';
            const existingPlaybooks = '${{ steps.rotation.outputs.existing_playbooks }}';
            const existingResearch = '${{ steps.rotation.outputs.existing_research }}';
            const recentPublished = `${{ steps.rotation.outputs.recent_published }}`;

            const n = cfg.niche;
            const a = cfg.author;
            const m = cfg.monetization;
            const c = cfg.content;

            const typeLabels = {
              tool: 'Tool Review',
              playbook: 'Playbook',
              research: 'Research Report'
            };

            const typeInstructions = {
              tool: [
                '## Your Mission: Find and Review a Tool',
                '',
                `You are the autonomous publisher for ${cfg.site.name}. Your job is to **research, select, and write** a tool review for ${n.audienceShort}.`,
                '',
                '### Step 1: Research & Select a Tool',
                '',
                `1. **Search for tools on ${m.primaryPlatform}** relevant to ${n.audience}. Categories: ${c.toolCategories.join(', ')}.`,
                `2. **Already reviewed (do NOT duplicate):** ${existingTools}`,
                '3. **MANDATORY PRODUCT VERIFICATION (HARD GATE).** Before writing ANYTHING, you MUST:',
                `   a. **Fetch the ${m.primaryPlatform} product page** using your web tool. Confirm the page loads, shows the product name, AND has an active purchasable deal. Look for a visible price and a Buy/Get button. **If the page says "Sold out", "Notify me", "Coming soon", or has no purchase button, the deal is NOT active. STOP and pick a different tool.**`,
                "   b. **Fetch the vendor's own website** and confirm the product exists and is operational.",
                `   c. Record the verified ${m.primaryPlatform} URL, vendor URL, and deal price.`,
                '   d. **If ANY verification fails, STOP. Pick a different tool. Do NOT guess that a product exists.** Publishing a review for a nonexistent or sold-out product is a critical failure.',
                `4. **Verify niche fit.** Ask: "${n.nicheFitQuestion}" If no, pick another.`,
                '5. **Prefer tools that fill gaps** in the current coverage or complement existing reviews.',
                '',
                '### Step 2: Create the Review',
                '',
                '1. Create `src/content/tools/{slug}.mdx` following the template in `.github/agents/publisher.agent.md`.',
                '2. Frontmatter: name, category, useCase, standardPrice, dealPrice, dealType, roiEstimate, image ("/images/{slug}.png"), imageStyle ("tech-thumbnail"), affiliateLink.',
                `3. **Affiliate link: Build ONLY from the verified URL.** Take the exact ${m.primaryPlatform} URL you confirmed in step 3a, URL-encode it, and insert into: \`${m.affiliateBase}{URL-encoded VERIFIED product page}\`. NEVER guess a product slug.`,
                '4. Import and use: Scorecard, RoiCalculator, DealCTA.',
                `5. Write in ${a.name}'s first-person voice. Be honest about limitations.`,
                '',
                '### Step 3: Content Quality Gate',
                '',
                `**MINIMUM WORD COUNT: ${c.minWords.tool} words of prose** (not counting frontmatter or component tags). The article MUST include:`,
                '- A detailed setup/workflow walkthrough (not just a feature list)',
                '- A Scorecard with summary that acknowledges real limitations',
                '- A deep-dive section covering what works, what does not, and honest gotchas',
                '- An ROI analysis section with specific numbers',
                '- At least one cross-reference to an existing article on the site (if any exist)',
                `- The phrase "${n.seoAnchorPhrase}" or a close variant in the first 200 words`,
                '',
                'If the article is under the minimum word count, add more depth. Thin content does not rank.',
                '',
                '### Step 4: Hero Image',
                '',
                '**Do NOT create a placeholder image file.** Just set `image: "/images/{slug}.png"` in the frontmatter. The hero image will be generated automatically by CI when you open the pull request.'
              ].join('\n'),

              playbook: [
                '## Your Mission: Research and Write a Playbook',
                '',
                `You are the autonomous publisher for ${cfg.site.name}. Your job is to **identify an automation gap and write a step-by-step playbook** for ${n.audienceShort}.`,
                '',
                '### Step 1: Research & Select a Topic',
                '',
                `1. **Tools already reviewed:** ${existingTools}`,
                `2. **Existing playbooks (do NOT duplicate):** ${existingPlaybooks}`,
                `3. **Identify an automation workflow** that saves ${n.audienceShort} significant time. Prioritize workflows using tools already reviewed on the site.`,
                `4. **VERIFY EVERY TOOL YOU REFERENCE.** If a tool is already reviewed on the site or is a well-known platform (${c.trustedPlatforms.join(', ')}), you may reference it. For ANY other tool, you MUST fetch its product page and confirm it exists AND is currently available for purchase before including it in the playbook. Do NOT reference products you have not verified.`,
                `5. **Search for trending automation questions** ${n.audienceShort} are asking. Common pain points: ${n.painPoints.join(', ')}.`,
                '6. **Must be actionable and reproducible.** Specific tools, specific steps.',
                '',
                '### Step 2: Create the Playbook',
                '',
                '1. Create `src/content/playbooks/{slug}.mdx` following the template in `.github/agents/publisher.agent.md`.',
                `2. Frontmatter: title, description, pubDate (today), author ("${a.name}"), readTime, tags, image ("/images/{slug}.png"), imageStyle ("system-blueprint").`,
                '3. Import and use: DataFlow, BlueprintDownload, RoiCalculator, DealCTA as appropriate.',
                '4. Link to existing tool reviews using `/tools/{slug}/` paths.',
                `5. Write in ${a.name}'s first-person voice.`,
                '',
                '### Step 3: Content Quality Gate',
                '',
                `**MINIMUM WORD COUNT: ${c.minWords.playbook} words of prose.** The playbook MUST include:`,
                '- A clear problem statement with specific time/cost pain',
                '- A mapped tool stack with links to reviewed tools',
                '- Step-by-step implementation (numbered, specific, reproducible)',
                '- A DataFlow component showing the automation pipeline',
                '- An ROI calculation with specific numbers',
                '',
                '### Step 4: Hero Image',
                '',
                '**Do NOT create a placeholder image file.** Just set `image: "/images/{slug}.png"` in the frontmatter. The hero image will be generated automatically by CI when you open the pull request.'
              ].join('\n'),

              research: [
                '## Your Mission: Research and Write an Analytical Report',
                '',
                `You are the autonomous publisher for ${cfg.site.name}. Your job is to **identify a high-value research question and produce a data-driven report** for ${n.audienceShort}.`,
                '',
                '### Step 1: Research & Select a Topic',
                '',
                `1. **Existing research (do NOT duplicate):** ${existingResearch}`,
                `2. **Search for trending questions** in the ${n.name} space: comparisons, benchmarks, privacy audits, regulatory impacts, AI tool evaluations.`,
                `3. **Must be searchable.** Something ${n.audienceShort} would actually Google.`,
                '4. **Data from primary sources only:** vendor docs, published certifications, official pricing, public guidelines, industry publications.',
                '',
                '### Step 2: Create the Report',
                '',
                '1. Create `src/content/research/{slug}.mdx` following the template in `.github/agents/publisher.agent.md`.',
                `2. Frontmatter: title, description, pubDate (today), author ("${a.name}"), readTime, tags, image ("/images/{slug}.png"), imageStyle ("emotional-photography").`,
                '3. Import and use: ComparisonTable, StatCallout, KeyTakeaway as appropriate.',
                '4. Mark ALL vendor-reported figures with "(vendor-reported figure)" and date stamps.',
                `5. Write in ${a.name}'s first-person voice.`,
                '',
                '### Step 3: Content Quality Gate',
                '',
                `**MINIMUM WORD COUNT: ${c.minWords.research} words of prose.** The report MUST include:`,
                '- A clear research question answered in the first 100 words',
                '- Data from primary sources with explicit attribution',
                '- At least one data-rich component (ComparisonTable, StatCallout, or KeyTakeaway)',
                '- Honest methodology notes (what was tested, what was not)',
                '',
                '### Step 4: Hero Image',
                '',
                '**Do NOT create a placeholder image file.** Just set `image: "/images/{slug}.png"` in the frontmatter. The hero image will be generated automatically by CI when you open the pull request.'
              ].join('\n')
            };

            const imageNote = '**Image generation:** Hero images are generated automatically by CI when the pull request is opened. Do NOT create placeholder image files.';

            const body = [
              `## Scheduled Content: ${typeLabels[contentType]}`,
              '',
              `**Date:** ${new Date().toISOString().split('T')[0]}`,
              `**Site:** ${cfg.site.name} (${cfg.site.url})`,
              `**Niche:** ${n.name}`,
              '',
              '### Existing Content Inventory',
              `- **Tools reviewed:** ${existingTools}`,
              `- **Playbooks published:** ${existingPlaybooks}`,
              `- **Research reports:** ${existingResearch}`,
              '',
              '### Recently Published',
              `- ${recentPublished}`,
              '',
              typeInstructions[contentType],
              '',
              '## Non-Negotiable Rules',
              '',
              `- **Voice perspective:** ${a.perspective} Example: "${a.voiceExample}"`,
              '- **NEVER use em-dash characters.** Use commas, colons, or separate sentences.',
              '- **NEVER fabricate statistics, benchmarks, or metrics.** Verifiable sources only, or frame as personal testing.',
              '- **NEVER publish placeholder text** like `[VERIFY]`, `[TODO]`, or `[PLACEHOLDER]`.',
              `- **NEVER publish a review for a product that does not exist or is sold out.** You MUST fetch the ${m.primaryPlatform} product page AND the vendor website with your web tool and confirm both load AND the deal is actively purchasable before writing. If the page 404s, redirects to a homepage, shows "Sold out", or has no purchase button, STOP and pick another tool.`,
              '- **Active deals only.** Verify the product/deal is live AND purchasable before writing. Build affiliate links ONLY from verified URLs, never from guessed slugs.',
              '- **AI Detection Prevention:** All content must pass AI detection tools. Read the Writing Style Fingerprint in `.github/agents/publisher.agent.md` before writing. Vary sentence lengths aggressively, use blunt openers, concede limitations honestly, use specific numbers, and NEVER use AI-flagged phrases (seamlessly, robust, leverage, game-changer, delve into, cutting-edge, comprehensive solution, etc.).',
              '- **Copy Review:** After writing, run the 5-pass proofread in Phase 5 of `.github/agents/publisher.agent.md`. Passes 1-4 cover style and voice. Pass 5 is a HARD GATE: re-fetch the product page, extract every plan tier\\'s name/price/limits from the live listing, compare each field against your article, and fix any mismatch. Also read the 10 most recent user reviews and incorporate any recurring complaints. Do NOT skip Pass 5.',
              '- **SEO Checklist:** Run through every item in Phase 7 (Article SEO Checklist) of `.github/agents/publisher.agent.md` before committing. Slug, H1, meta description, internal links, word count, niche targeting, and keyword placement all matter.',
              '- Read `AGENTS.md` for full brand guidelines and `.github/agents/publisher.agent.md` for content templates and style rules.',
              '',
              imageNote,
              '',
              '## After Creating Content',
              '',
              '1. Update `src/data/content-calendar.json`:',
              '   - Increment `nextSlot` by 1',
              `   - Add to the \`published\` array: \`{"type": "${contentType}", "title": "Your Title", "slug": "your-slug", "date": "YYYY-MM-DD"}\``,
              '2. Increment the `CACHE_NAME` version in `public/sw.js`.',
              '3. Run `npm run build` to confirm zero errors.',
              '',
              '**IMPORTANT:** When you are finished, mark the pull request as **Ready for review** so it can be auto-merged. Do NOT leave it as a Draft.'
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Publisher] Create ${typeLabels[contentType]} (${new Date().toISOString().split('T')[0]})`,
              body: body,
              labels: ['content', `content-${contentType}`, 'copilot']
            });

            console.log(`Created issue #${issue.number}: ${issue.title}`);
            console.log(`URL: ${issue.html_url}`);
            core.setOutput('issue_number', issue.number);

      - name: Assign Copilot to issue
        if: steps.cleanup.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.create-issue.outputs.issue_number }}');
            console.log(`Assigning Copilot to issue #${issueNumber}...`);

            const result = await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: ['copilot-swe-agent[bot]']
            });

            const assignees = (result.data.assignees || []).map(a => a.login);
            console.log(`Assignees after call: ${JSON.stringify(assignees)}`);

            const copilotAssigned = assignees.some(a =>
              a.toLowerCase() === 'copilot' || a.toLowerCase() === 'copilot-swe-agent[bot]'
            );

            if (copilotAssigned) {
              console.log('Copilot successfully assigned via API!');
            } else {
              console.log('Assignment API returned OK but Copilot not in assignee list.');
              console.log('Waiting 5 seconds before posting @copilot comment as fallback...');
              await new Promise(resolve => setTimeout(resolve, 5000));
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: '@copilot'
              });
              console.log('Posted @copilot comment as fallback trigger');
            }

            console.log('');
            console.log('If Copilot responds with "repository ruleset violation" error:');
            console.log('1. Go to Settings > Rules > Rulesets');
            console.log('2. Edit each ruleset that targets branches');
            console.log('3. Add "Copilot" to the bypass list');
            console.log('See: https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-rulesets/creating-rulesets-for-a-repository#granting-bypass-permissions-for-your-branch-or-tag-ruleset');
