name: Daily Deal Monitor

on:
  schedule:
    # Every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-deals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run deal health check
        id: check
        run: |
          # Run the check script; capture output even if it exits non-zero
          set +e
          OUTPUT=$(node scripts/check-deals.mjs 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"

          # Save full JSON output for the next step
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Write to a file so github-script can read it
          echo "$OUTPUT" > deal-check-results.json

      - name: Create issue if deals have problems
        if: steps.check.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('deal-check-results.json', 'utf8'));
            } catch (e) {
              core.setFailed('Could not parse deal check results');
              return;
            }

            const issues = results.results.filter(r => !['healthy', 'fallback'].includes(r.status));

            if (issues.length === 0) {
              console.log('No issues found despite non-zero exit. Skipping.');
              return;
            }

            // Check if there's already an open deal-monitor issue to avoid duplicates
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deal-monitor',
              state: 'open'
            });

            if (existingIssues.length > 0) {
              // Add a comment to the existing issue instead of creating a new one
              const existing = existingIssues[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  `## Daily Check Update (${new Date().toISOString().split('T')[0]})`,
                  '',
                  `Still detecting ${issues.length} deal issue(s):`,
                  '',
                  ...issues.map(i => `- **${i.name}** (\`${i.file}\`): ${i.status} - ${i.reason}`)
                ].join('\n')
              });

              console.log(`Updated existing issue #${existing.number}`);
              return;
            }

            // Build the issue body
            const issueRows = issues.map(i => {
              return `| ${i.name} | \`${i.file}\` | ${i.status} | ${i.reason} |`;
            }).join('\n');

            const body = [
              '## Deal Health Alert',
              '',
              `The daily deal monitor detected **${issues.length} issue(s)** with listed tools.`,
              '',
              '| Tool | File | Status | Details |',
              '|------|------|--------|---------|',
              issueRows,
              '',
              '## Required Actions',
              '',
              'For each affected tool:',
              '',
              '1. **If status is `expired`** (redirected to search): Update the `affiliateLink` in the tool\'s MDX frontmatter to use the AppSumo search fallback:',
              '   ```',
              '   https://appsumo.8odi.net/c/6618781/416948/7443?u=https%3A%2F%2Fappsumo.com%2Fsoftware-search%2F%3Fquery%3D{tool-name}',
              '   ```',
              '   Also update `dealPrice` and `dealType` if the pricing model has changed.',
              '',
              '2. **If status is `dead`** (HTTP error or timeout): Investigate whether the product still exists. If discontinued, delete the `.mdx` file from `src/content/tools/`, the hero image from `public/images/`, and remove it from `content-calendar.json`.',
              '',
              '3. After all updates, increment `CACHE_NAME` in `public/sw.js`.',
              '',
              '## Reference',
              '',
              `- Full check results: ${results.totalTools} tools checked, ${results.healthy} healthy, ${results.issues} with issues`,
              `- Checked at: ${results.checkedAt}`,
              '',
              'See `AGENTS.md` for affiliate link format rules and `.github/agents/publisher.agent.md` for the deal health check protocol.'
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Deal Monitor] ${issues.length} deal(s) need attention`,
              body: body,
              labels: ['deal-monitor', 'copilot'],
              assignees: ['copilot']
            });

            console.log(`Created issue #${issue.number}: ${issue.title}`);
